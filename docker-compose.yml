services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  stock-service:
    build: .
    restart: unless-stopped
    environment:
      - PORT=3000
      - REDIS_URL=redis:6379
    depends_on:
      - redis

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - stock-service
    restart: unless-stopped
