services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  stock-service-1:
    build: .
    restart: "no"
    environment:
      - PORT=3000
      - REDIS_URL=redis:6379
    depends_on:
      redis:
        condition: service_healthy

  stock-service-2:
    build: .
    restart: "no"
    environment:
      - PORT=3000
      - REDIS_URL=redis:6379
    depends_on:
      redis:
        condition: service_healthy

  stock-service-3:
    build: .
    restart: "no"
    environment:
      - PORT=3000
      - REDIS_URL=redis:6379
    depends_on:
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - stock-service-1
      - stock-service-2
      - stock-service-3
    restart: unless-stopped
